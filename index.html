<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WMS — Đăng Nhập</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo h1 { font-size: 1.5rem; color: #f8fafc; font-weight: 700; }
    .logo p  { font-size: 0.85rem; color: #94a3b8; margin-top: 0.25rem; }

    label {
      display: block;
      font-size: 0.82rem;
      color: #94a3b8;
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      padding: 0.65rem 0.875rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 7px;
      color: #f8fafc;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 1rem;
    }
    input:focus { border-color: #6366f1; }
    input::placeholder { color: #475569; }

    button {
      width: 100%;
      padding: 0.7rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    button:hover:not(:disabled) { background: #4f46e5; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .error {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      padding: 0.65rem 0.875rem;
      border-radius: 7px;
      font-size: 0.83rem;
      margin-bottom: 1rem;
      display: none;
    }
    .error.show { display: block; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>🏭 WMS</h1>
      <p>Hệ thống quản lý kho xe</p>
    </div>

    <div id="errorBox" class="error"></div>

    <form id="loginForm">
      <label for="username">Tên đăng nhập</label>
      <input id="username" type="text" placeholder="admin" autocomplete="username" required>

      <label for="password">Mật khẩu</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required>

      <button id="loginBtn" type="submit">
        <span id="btnText">Đăng nhập</span>
      </button>
    </form>
  </div>

  <script src="js/api-client.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Nếu đã đăng nhập → redirect luôn
    if (AUTH.isLoggedIn()) {
      const user = AUTH.getUser();
      const map  = { admin: 'admin.html', warehouse: 'warehouse.html', viewer: 'viewer.html' };
      window.location.href = map[user?.role] || 'index.html';
    }

    const form     = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');
    const btn      = document.getElementById('loginBtn');
    const btnText  = document.getElementById('btnText');

    function setLoading(loading) {
      btn.disabled = loading;
      btnText.innerHTML = loading
        ? '<span class="spinner"></span>'
        : 'Đăng nhập';
    }

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.add('show');
    }

    function hideError() {
      errorBox.classList.remove('show');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      setLoading(true);

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      const result = await AUTH.login(username, password);
      if (!result.success) {
        showError(result.message || 'Đăng nhập thất bại');
        setLoading(false);
      }
      // Nếu thành công, AUTH.login() tự redirect
    });
  </script>
</body>
</html>
